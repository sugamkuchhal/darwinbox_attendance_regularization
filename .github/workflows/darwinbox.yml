name: Darwinbox Attendance Regularization

on:
  schedule:
    # Runs every weekday at 9:30 PM IST (4:00 PM UTC)
    - cron: "0 16 * * 1-5"

  workflow_dispatch: # Manual trigger from GitHub UI

# ── Permissions needed to create/close GitHub Issues for OTP flow ──
permissions:
  issues: write
  contents: read

jobs:
  regularize:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 📦 Install dependencies
        run: npm install

      - name: 🎭 Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: 🤖 Run attendance regularization
        env:
          DARWINBOX_URL:      ${{ secrets.DARWINBOX_URL }}
          DARWINBOX_USERNAME: ${{ secrets.DARWINBOX_USERNAME }}
          DARWINBOX_PASSWORD: ${{ secrets.DARWINBOX_PASSWORD }}
          DARWINBOX_EMPLOYEE_ID: ${{ secrets.DARWINBOX_EMPLOYEE_ID }}
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}      # auto-provided, no setup needed
          GITHUB_REPOSITORY:  ${{ github.repository }}         # auto-provided, no setup needed
        run: node index.js

      - name: 📸 Upload screenshots (for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: "*.png"
          retention-days: 7
